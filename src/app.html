<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />

		%sveltekit.head%

		<!-- Static SEO + social defaults. The client-rendered app pages rely on
		     these; server-rendered pages (e.g. /faq) set their own title and
		     description above via %sveltekit.head%, which wins by document order. -->
		<title>OfficeForms — Browser games disguised as office apps</title>
		<meta
			name="description"
			content="Play Snake, Tetris and a typing test disguised as Excel, Outlook, Slack, Teams, Notion, Figma and Salesforce. Press Esc and it's instantly back to work. No account, runs in your browser."
		/>

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="OfficeForms" />
		<meta property="og:url" content="https://officeforms.pro/" />
		<meta property="og:title" content="Games hidden in your office apps" />
		<meta
			property="og:description"
			content="Snake, Tetris and a typing test disguised as Excel, Outlook, Slack, Teams and more. Press Esc and it's instantly back to work — no account, in your browser."
		/>
		<meta property="og:image" content="https://officeforms.pro/og-image.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="OfficeForms — a game of Snake hidden inside an Excel spreadsheet" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:locale:alternate" content="es_ES" />
		<meta property="og:locale:alternate" content="de_DE" />
		<meta property="og:locale:alternate" content="it_IT" />
		<meta property="og:locale:alternate" content="fr_FR" />

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Games hidden in your office apps" />
		<meta
			name="twitter:description"
			content="Snake, Tetris and a typing test disguised as Excel, Outlook, Slack, Teams and more. Press Esc and it's instantly back to work."
		/>
		<meta name="twitter:image" content="https://officeforms.pro/og-image.png" />
		<meta name="twitter:image:alt" content="OfficeForms — a game of Snake hidden inside an Excel spreadsheet" />
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
